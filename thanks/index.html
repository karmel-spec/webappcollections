<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Received, with thanks — The Gallery</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/icons/gallery.png">
<style>
:root{--wall:#EDE3D3; --ink:#3D3428; --ink-soft:#7C6F5C; --paper:#FFFDF8; --brass-deep:#A88448; --accent:#A64B3C}
body{margin:0; background:var(--wall); color:var(--ink); font-family:Charter,Georgia,serif; line-height:1.55;
  background-image:linear-gradient(rgba(255,255,255,.28),rgba(0,0,0,.035));
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px}
.card{max-width:520px; background:var(--paper); border:1px solid #E5DAC4; border-radius:6px;
  box-shadow:0 8px 22px rgba(60,45,25,.18); padding:44px 40px; text-align:center}
.orn{color:var(--accent); font-size:22px; margin:0 0 10px}
h1{font-family:Didot,"Bodoni 72",Georgia,serif; font-size:30px; font-weight:400; margin:0 0 10px; letter-spacing:.03em}
p{font-style:italic; font-size:15px; color:var(--ink-soft); margin:0 0 26px}
a{display:inline-block; text-decoration:none; font-family:"Avenir Next","Helvetica Neue",sans-serif; font-size:11.5px;
  letter-spacing:.2em; text-transform:uppercase; font-weight:600; color:#3A2E1A;
  background:linear-gradient(180deg,#C9A96E,var(--brass-deep)); padding:14px 32px; border-radius:2px;
  box-shadow:0 2px 6px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.4)}
a:hover{filter:brightness(1.08)}
</style>
</head>
<body>
<div class="card">
  <p class="orn">❧</p>
  <h1>Received, with thanks</h1>
  <p>Your note is pinned to the studio wall and on its way to Karmel's inbox.</p>
  <a href="/">← Back to the Gallery</a>
</div>
</body>
</html>
